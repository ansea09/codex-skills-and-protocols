schema_version: 1
method: promote-local-skills-to-public-staged-skills
source_root: "${CODEX_HOME:-$HOME/.codex}/skills"
target_root: "skills"

skills:
  - name: fpf-work-guide
    mode: auto
    reason: "Public copy can be generated from the local working skill after generated artifacts and private markers are removed."
  - name: doc-to-md
    mode: curated
    reason: "Public copy includes reviewed publication docs, optional workflow boundaries, plugin packaging, and local-policy separation; do not overwrite mechanically without manual diff review."

exclude_artifacts:
  - ".DS_Store"
  - "__pycache__"
  - "*.pyc"

required_checks:
  - structural_validation
  - private_marker_scan
  - skills_index_coverage
  - plugin_copy_drift_check
  - installed_staged_plugin_release_drift_check_for_doc_to_md
  - doc_to_md_compatibility_semantic_check
  - doc_to_md_machine_readable_doctor_check
  - doc_to_md_regression_snapshot_check_before_markitdown_upgrade
  - installed_runtime_staged_drift_check_for_personal_sync
  - manual_git_diff_review
